<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarjeta Digital — INSEIN SRL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green:  #78be44;
      --gray:   #6b7c82;
      --dark:   #1c2b32;
      --darker: #111c22;
      --white:  #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100dvh;
      background: var(--dark);
      background-image:
        radial-gradient(ellipse 80% 55% at 50% 0%, rgba(120,190,68,.14) 0%, transparent 65%),
        linear-gradient(180deg, #1c2b32 0%, #0f1a20 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      font-family: 'Barlow', system-ui, sans-serif;
    }

    /* ── CARD ── */
    .card {
      width: min(400px, 100%);
      background: var(--white);
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(120,190,68,.2),
        0 32px 80px rgba(0,0,0,.55),
        0 8px 24px rgba(0,0,0,.3);
      animation: up .55s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── BANNER ── */
    .banner {
      background: var(--darker);
      background-image: linear-gradient(135deg, #0d1a20 0%, #1c2b32 55%, #0d1a20 100%);
      padding: 32px 40px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .banner::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(120,190,68,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,190,68,.06) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }
    .banner::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green) 25%, var(--green) 75%, transparent);
    }

    .logo {
      width: 920px;
      max-width: 95%;
      position: relative; z-index: 1;
      animation: up .5s .08s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── NOMBRE / CARGO ── */
    .info {
      padding: 26px 32px 0;
      text-align: center;
    }
    .info-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.7rem; font-weight: 800;
      color: var(--darker);
      letter-spacing: .4px; line-height: 1.1;
      animation: up .45s .18s cubic-bezier(.22,1,.36,1) both;
    }
    .info-role {
      margin-top: 7px;
      font-size: .78rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.6px;
      color: var(--green);
      animation: up .45s .22s cubic-bezier(.22,1,.36,1) both;
    }
    .info-company {
      margin-top: 4px;
      font-size: .85rem; font-weight: 400;
      color: var(--gray);
      animation: up .45s .25s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── SEPARADOR ── */
    .sep {
      height: 1px;
      margin: 22px 32px 0;
      background: linear-gradient(90deg, transparent, #d8e3e8 30%, #d8e3e8 70%, transparent);
    }

    .btn-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: calc(100% - 56px);
      margin: 20px 28px 0;
      padding: 14px 20px;
      background: var(--darker);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      animation: up .45s .28s cubic-bezier(.22,1,.36,1) both;
    }
    .btn-add:hover  {
      background: #2e4855;
      box-shadow: 0 8px 24px rgba(120,190,68,.2);
      transform: translateY(-2px);
    }
    .btn-add:active { transform: translateY(0); }

    /* ── BOTONES DE ACCIÓN ── */
    .actions {
      padding: 16px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-radius: 14px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      transition: transform .15s, box-shadow .2s, background .2s;
      animation: up .45s cubic-bezier(.22,1,.36,1) both;
    }
    .action-btn:hover  { transform: translateY(-2px); }
    .action-btn:active { transform: translateY(0); }

    .action-btn .icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .action-btn .text {
      display: flex; flex-direction: column; gap: 1px;
    }
    .action-btn .label {
      font-size: .68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.2px;
      opacity: .6;
    }
    .action-btn .value {
      font-size: .9rem; font-weight: 500;
    }

    /* WhatsApp */
    .btn-wa {
      background: #edfaf2;
      color: #1a4a2e;
      box-shadow: 0 2px 12px rgba(37,211,102,.12);
    }
    .btn-wa:hover { box-shadow: 0 8px 24px rgba(37,211,102,.22); background: #dff7ea; }
    .btn-wa .icon { background: #25d366; }

    /* Email */
    .btn-email {
      background: #edf2fe;
      color: #1a2a5e;
      box-shadow: 0 2px 12px rgba(66,133,244,.10);
    }
    .btn-email:hover { box-shadow: 0 8px 24px rgba(66,133,244,.2); background: #e0eafd; }
    .btn-email .icon { background: #4285f4; }

    /* Web */
    .btn-web {
      background: #f0f9ea;
      color: #1e3d0a;
      box-shadow: 0 2px 12px rgba(120,190,68,.12);
    }
    .btn-web:hover { box-shadow: 0 8px 24px rgba(120,190,68,.22); background: #e4f5d8; }
    .btn-web .icon { background: var(--green); }

    /* ── FOOTER ── */
    .footer {
      border-top: 1px solid #edf1f3;
      padding: 13px 28px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .footer span { font-size: .7rem; color: #a8bcc4; letter-spacing: .3px; }
    .footer .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--green); }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .actions .action-btn:nth-child(1) { animation-delay: .32s; }
    .actions .action-btn:nth-child(2) { animation-delay: .38s; }
    .actions .action-btn:nth-child(3) { animation-delay: .44s; }
  </style>
</head>

<body>
<div class="card">

  <!-- ── BANNER ── -->
  <div class="banner">
    <img class="logo" src="banner.png" alt="INSEIN SRL" />
  </div>

  <!-- ── INFO ── -->
  <div class="info">
    <p class="info-name"    id="name">Marcelo G. Espa&ntilde;a Brice&ntilde;o</p>
    <p class="info-role"    id="role">Gerente General</p>
    <p class="info-company" id="company">INSEIN SRL</p>
  </div>

  <div class="sep"></div>

  <!-- ── AGREGAR A CONTACTOS ── -->
  <a class="btn-add" id="btn-tel" href="tel:+59172987377">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.92 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.83 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
    </svg>
    Agregar a contactos
  </a>

  <!-- ── LINKS ── -->
  <div class="actions">

    <a class="action-btn btn-wa" id="link-wa" href="#" target="_blank" rel="noopener">
      <div class="icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
        </svg>
      </div>
      <div class="text">
        <span class="label">WhatsApp</span>
        <span class="value" id="wa-num">+591 72987377</span>
      </div>
    </a>

    <a class="action-btn btn-email" id="link-email" href="#" target="_blank" rel="noopener">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </div>
      <div class="text">
        <span class="label">Correo electr&oacute;nico</span>
        <span class="value" id="email-addr">marcelo.espana@inseinsrl.com</span>
      </div>
    </a>

    <a class="action-btn btn-web" href="https://inseinsrl.com" target="_blank" rel="noopener">
      <div class="icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <div class="text">
        <span class="label">Sitio web</span>
        <span class="value">inseinsrl.com</span>
      </div>
    </a>

  </div>

  <!-- ── FOOTER ── -->
  <div class="footer">
    <span>INSEIN SRL</span>
    <div class="dot"></div>
    <span>Tarjeta Digital</span>
  </div>

</div>

<script>
  /* ════════════════════════════════════════════
     EDITAR SOLO ESTE BLOQUE POR EMPLEADO
  ════════════════════════════════════════════ */
  const CONTACT = {
  name:     "Jabneel Miller Ferrufino Iturri",
  role:     "Jefe de Gestión & Proyectos",
  company:  "INSEIN SRL",
  phone:    "+591 72039097",   /* número visible */
  whatsapp: "59172039097",       /* sin + ni espacios */
  email:    "miller.ferrufino@inseinsrl.com",
};

  /* ════════════════════════════════════════════ */

  /* Inyectar datos en el HTML */
  document.getElementById('name').textContent         = CONTACT.name;
  document.getElementById('role').textContent         = CONTACT.role;
  document.getElementById('company').textContent      = CONTACT.company;
  document.getElementById('wa-num').textContent       = CONTACT.phone;
  document.getElementById('email-addr').textContent   = CONTACT.email;
  document.getElementById('link-wa').href             = 'https://wa.me/' + CONTACT.whatsapp;

  document.getElementById('btn-tel').href             = 'tel:+' + CONTACT.whatsapp;

</script>
</body>
</html>
